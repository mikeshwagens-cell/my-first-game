<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBITAL ULTIMATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #ui-overlay { position: absolute; top: 15px; left: 15px; z-index: 50; pointer-events: none; text-shadow: 0 0 10px #00f2ff; }
        #combo-text { color: #ff00ff; font-weight: bold; font-size: 20px; transition: 0.2s; }
        #magnet-ui { color: #b700ff; font-weight: bold; font-size: 16px; display: none; margin-top: 5px; text-shadow: 0 0 10px #b700ff;}
        .hud-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                   background: linear-gradient(45deg, #0088cc, #00f2ff); border: none; padding: 15px 30px; 
                   border-radius: 15px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; 
                   box-shadow: 0 0 15px #0088cc; pointer-events: auto; display: none; z-index: 100;}
        #game-over { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 40px; color: #ff0044; 
                     text-shadow: 0 0 20px #ff0044; display: none; z-index: 100; font-weight: bold; pointer-events: none;}
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div style="font-size: 28px;">💎 <span id="score">0</span></div>
        <div id="combo-text">Combo: x1</div>
        <div style="font-size: 14px; opacity: 0.8; margin-top: 5px;">Level: <span id="lvl">1</span></div>
        <div id="magnet-ui">🧲 MAGNET ACTIVE!</div>
    </div>
    
    <div id="game-over">SYSTEM FAILURE</div>
    <button class="hud-btn" id="save-btn" onclick="saveAndExit()">SAVE PROGRESS & EXIT</button>
    
    <div id="game-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let player, crystals, goldCrystals, enemies, powerups, blackhole;
        let score = 0, level = 1, speed = 0.15;
        let combo = 1, comboTimer, magnetTimer;
        let isGameOver = false, magnetActive = false;
        let lastTapTime = 0;

        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            parent: 'game-container', backgroundColor: '#050505',
            physics: { default: 'arcade' }, scene: { create, update }
        };
        const game = new Phaser.Game(config);

        function create() {
            player = this.add.circle(window.innerWidth/2, window.innerHeight/2 + 100, 15, 0x00ff00);
            this.physics.add.existing(player);

            crystals = this.physics.add.group();
            goldCrystals = this.physics.add.group();
            enemies = this.physics.add.group();
            powerups = this.physics.add.group();

            for(let i=0; i<6; i++) spawnCrystal(this);

            // Спавн врагов
            this.time.addEvent({ delay: 3500, loop: true, callback: () => { if(!isGameOver) spawnEnemy(this); }});
            // Спавн Магнита раз в 15 секунд
            this.time.addEvent({ delay: 15000, loop: true, callback: () => { if(!isGameOver) spawnPowerup(this); }});
            // Спавн Золотого Кристалла раз в 10 секунд
            this.time.addEvent({ delay: 10000, loop: true, callback: () => { if(!isGameOver) spawnGold(this); }});

            // Черная дыра в центре (появляется через 20 секунд)
            this.time.delayedCall(20000, () => {
                blackhole = this.add.circle(window.innerWidth/2, window.innerHeight/2, 40, 0x220033);
                blackhole.setStrokeStyle(4, 0xaa00ff, 0.8);
                this.physics.add.existing(blackhole);
                this.physics.add.overlap(player, blackhole, gameOver, null, this);
            });

            // Столкновения
            this.physics.add.overlap(player, crystals, collectCrystal, null, this);
            this.physics.add.overlap(player, goldCrystals, collectGold, null, this);
            this.physics.add.overlap(player, powerups, collectMagnet, null, this);
            this.physics.add.overlap(player, enemies, gameOver, null, this);

            // Механика Рывка (Двойной тап)
            this.input.on('pointerdown', () => {
                let now = this.time.now;
                if (now - lastTapTime < 300 && !isGameOver) {
                    // Делаем рывок
                    this.tweens.add({ targets: player, x: this.input.activePointer.x, y: this.input.activePointer.y, duration: 150, ease: 'Power2' });
                    tg.HapticFeedback.impactOccurred('heavy');
                }
                lastTapTime = now;
            });
        }

        function spawnCrystal(scene) {
            const x = Phaser.Math.Between(20, window.innerWidth - 20);
            const y = Phaser.Math.Between(20, window.innerHeight - 20);
            const c = scene.add.circle(x, y, 8, 0x00f2ff);
            scene.physics.add.existing(c);
            crystals.add(c);
        }

        function spawnGold(scene) {
            const x = Phaser.Math.Between(50, window.innerWidth - 50);
            const y = Phaser.Math.Between(50, window.innerHeight - 50);
            const g = scene.add.circle(x, y, 12, 0xffd700);
            g.setStrokeStyle(2, 0xffaa00, 1);
            scene.physics.add.existing(g);
            goldCrystals.add(g);
        }

        function spawnPowerup(scene) {
            const x = Phaser.Math.Between(30, window.innerWidth - 30);
            const y = Phaser.Math.Between(30, window.innerHeight - 30);
            const p = scene.add.circle(x, y, 10, 0xb700ff);
            scene.physics.add.existing
