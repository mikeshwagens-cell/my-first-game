<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Crystal Hunter Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.gz.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram-sdk.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #ui { position: absolute; width: 100%; top: 10px; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .btn { pointer-events: auto; background: #0088cc; border: none; color: white; padding: 10px 15px; border-radius: 12px; font-weight: bold; }
        #score-container { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-container">💎 <span id="score">0</span></div>
        <div id="ton-connect"></div>
        <button class="btn" onclick="showAd()" id="ad-btn">📺 +500</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const lang = tg.initDataUnsafe.user.language_code || 'en';
        
        // Локализация UI игры
        const i18n = {
            ru: { ad_btn: "📺 +500 Очков", alert_ad: "Реклама просмотрена! +500 💎" },
            en: { ad_btn: "📺 +500 Points", alert_ad: "Ad watched! +500 💎" },
            es: { ad_btn: "📺 +500 Puntos", alert_ad: "¡Anuncio visto! +500 💎" }
        };
        const t = i18n[lang] || i18n['en'];
        document.getElementById('ad-btn').innerText = t.ad_btn;

        // Инициализация TON и Adsgram
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://your-domain.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });
        const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });

        // Игра Phaser
        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            physics: { default: 'arcade' }, scene: { create, update }
        };
        const game = new Phaser.Game(config);
        let player, crystals, score = 0;

        function create() {
            player = this.add.circle(window.innerWidth/2, window.innerHeight/2, 20, 0x00ff00);
            this.physics.add.existing(player);
            crystals = this.physics.add.group();
            for(let i=0; i<5; i++) spawnCrystal(this);
        }

        function spawnCrystal(scene) {
            const c = scene.add.circle(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 10, 0x0088ff);
            scene.physics.add.existing(c);
            crystals.add(c);
        }

        function update() {
            this.physics.overlap(player, crystals, (p, c) => {
                c.destroy();
                score += 10;
                document.getElementById('score').innerText = score;
                spawnCrystal(this);
                tg.HapticFeedback.impactOccurred('light');
            });
            // Движение за пальцем
            if (this.input.activePointer.isDown) {
                player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, 0.2);
                player.y = Phaser.Math.Linear(player.y, this.input.activePointer.y, 0.2);
            }
        }

        async function showAd() {
            try {
                await AdController.show();
                score += 500;
                document.getElementById('score').innerText = score;
                tg.showAlert(t.alert_ad);
            } catch (e) { tg.showAlert("Ad error"); }
        }
    </script>
</body>
</html>
