<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; }
        .top-bar { display: flex; justify-content: space-around; background: #1e293b; padding: 15px; border-bottom: 2px solid #334155; }
        .stat-item { text-align: center; font-weight: bold; }
        .stat-val { color: #38bdf8; display: block; }

        .hangar { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .slot { background: #1e293b; border-radius: 12px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #334155; position: relative; }
        .slot.occupied { border-style: solid; border-color: #38bdf8; background: #0f172a; }
        
        .lvl { position: absolute; top: 5px; right: 8px; font-size: 12px; color: #94a3b8; }
        .icon { font-size: 45px; margin-bottom: 10px; }
        
        button { background: #38bdf8; border: none; color: white; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 80%; }
        .btn-hatch { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .lock { color: #64748b; font-size: 30px; }
        .timer { font-size: 12px; color: #fb7185; margin-top: 5px; }

        .buy-btn { grid-column: span 2; background: #f59e0b; padding: 15px; margin: 0 20px; border-radius: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="stat-item">Пыль <span class="stat-val" id="dust">0</span></div>
        <div class="stat-item">Турбины <span class="stat-val" id="turb">0</span></div>
    </div>

    <div class="hangar" id="hangar"></div>
    <div class="buy-btn" onclick="buySlot()">🏗 КУПИТЬ СЛОТ (💎 <span id="slot-cost"></span>)</div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('dust').innerText = params.get('dust');
        document.getElementById('turb').innerText = params.get('turb');
        const totalSlots = parseInt(params.get('slots'));
        document.getElementById('slot-cost').innerText = totalSlots * 10;

        const inv = params.get('inv').split('|').filter(x => x !== "");
        const hangar = document.getElementById('hangar');

        for (let i = 0; i < totalSlots; i++) {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'slot';
            
            if (inv[i]) {
                const [id, lvl, isInc, readyAt] = inv[i].split(',');
                slotDiv.classList.add('occupied');
                slotDiv.innerHTML = `<span class="lvl">LVL ${lvl}</span>`;
                
                if (isInc == "1") {
                    const timeLeft = parseInt(readyAt) - Math.floor(Date.now()/1000);
                    if (timeLeft <= 0) {
                        slotDiv.innerHTML += `<div class="icon">📦</div><button class="btn-hatch" onclick="hatch(${id})">ОТКРЫТЬ</button>`;
                    } else {
                        slotDiv.innerHTML += `<div class="icon">⏳</div><div class="timer">Созревает...</div>`;
                    }
                } else {
                    slotDiv.innerHTML += `<div class="icon">🛩</div><button onclick="merge(${id})">MERGE</button>`;
                }
            } else {
                slotDiv.innerHTML = `<div class="lock">∅</div><span style="font-size:10px; color:#475569">ПУСТО</span>`;
            }
            hangar.appendChild(slotDiv);
        }

        function merge(id) {
            tg.sendData(JSON.stringify({action: "get_link", p_id: id}));
        }
        function hatch(id) {
            tg.sendData(JSON.stringify({action: "hatch", p_id: id}));
        }
        function buySlot() {
            tg.sendData(JSON.stringify({action: "buy_slot"}));
        }
    </script>
</body>
</html>
