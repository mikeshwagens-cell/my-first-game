<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obital Aviation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --danger: #fb7185; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; background: var(--card); border-bottom: 1px solid #334155; }
        .balance { display: flex; gap: 15px; font-weight: bold; font-size: 14px; }
        .balance span { color: var(--primary); }

        .content { height: calc(100vh - 130px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .page { display: none; }
        .page.active { display: block; }

        .shop-card { background: var(--card); padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 15px; }
        .hangar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .slot { background: var(--card); border-radius: 16px; height: 140px; border: 2px solid #334155; display: flex; align-items: center; justify-content: center; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { text-align: center; color: #64748b; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 4px; }

        /* Кнопка поддержки */
        .btn-support { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="balance">
            <div>💨 <span id="dust">0</span></div>
            <div>💎 <span id="turb">0</span></div>
        </div>
        <div style="font-weight: bold;">PILOT</div>
    </div>

    <div class="content">
        <div id="hangar" class="page active">
            <div class="hangar-grid" id="hangar-grid"></div>
        </div>

        <div id="market" class="page">
            <div class="shop-card"><h3>Кейс с запчастями</h3><button style="background:#f59e0b; border:none; color:white; padding:10px; border-radius:8px; width:100%;">100 💨</button></div>
        </div>

        <div id="tasks" class="page">
            <h2 style="text-align: center;">Задания</h2>
            <div class="shop-card" style="text-align: left;">🔹 Подписка на канал (+50 💨)</div>
            <div class="shop-card" style="text-align: left;">🔹 Пригласить 3 друзей (+150 💨)</div>
            
            <button class="btn-support" onclick="requestSupport()">🆘 СЛУЖБА ПОДДЕРЖКИ</button>
        </div>

        <div id="friends" class="page">
            <h2 style="text-align: center;">Друзья</h2>
            <p style="text-align: center; color: #64748b;">Тут будет ваш список рефералов.</p>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="openPage('hangar', this)"><span class="nav-icon">🛩</span>Ангар</div>
        <div class="nav-item" onclick="openPage('market', this)"><span class="nav-icon">🛒</span>Рынок</div>
        <div class="nav-item" onclick="openPage('tasks', this)"><span class="nav-icon">📜</span>Задания</div>
        <div class="nav-item" onclick="openPage('friends', this)"><span class="nav-icon">👥</span>Друзья</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
        }

        function requestSupport() {
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify({action: "support_init"}));
            tg.close();
        }

        // Рендерим пустые слоты для красоты (заглушка)
        const grid = document.getElementById('hangar-grid');
        for(let i=0; i<4; i++) {
            const s = document.createElement('div'); s.className = 'slot';
            s.innerHTML = '<span style="color:#334155; font-size:24px;">∅</span>';
            grid.appendChild(s);
        }
    </script>
</body>
</html>
