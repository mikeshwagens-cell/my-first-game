<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBITAL SYNDICATE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #0a0a0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 20px;}
        
        /* Шапка профиля */
        .header { background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0f 100%); padding: 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100;}
        .title { font-size: 24px; font-weight: 800; background: -webkit-linear-gradient(45deg, #00f2ff, #0088cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; letter-spacing: 2px;}
        .stats { font-size: 14px; color: #888; display: flex; justify-content: center; gap: 15px;}
        
        /* Сетка инвентаря */
        .inventory { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        
        /* Карточка Дрона */
        .card { background: #12121c; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #222; position: relative; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        .card.common { border-color: #555; }
        .card.rare { border-color: #0088cc; box-shadow: 0 0 10px rgba(0, 136, 204, 0.2); }
        .card.legendary { border-color: #ffaa00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); }
        
        /* Иконка / Изображение */
        .drone-icon { font-size: 50px; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .capsule-icon { font-size: 50px; margin: 10px 0; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 20px #b700ff; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .lvl-badge { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 8px; font-size: 12px; font-weight: bold;}
        .drone-name { font-weight: bold; font-size: 16px; margin-bottom: 5px;}
        
        /* Кнопки и таймеры */
        .btn-breed { background: linear-gradient(45deg, #00f2ff, #0088cc); border: none; width: 100%; padding: 10px; border-radius: 8px; color: white; font-weight: bold; margin-top: 10px; cursor: pointer;}
        .timer-box { background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; margin-top: 10px; font-family: monospace; font-size: 14px; color: #ff007a; border: 1px solid #ff007a;}
    </style>
</head>
<body>

    <div class="header">
        <div class="title">OBITAL LABS</div>
        <div class="stats">
            <div>🔋 Energy: 3/3</div>
            <div>🛸 Drones: 3</div>
        </div>
    </div>

    <div class="inventory">
        <div class="card common">
            <div class="lvl-badge">LVL 1</div>
            <div class="drone-icon">👾</div>
            <div class="drone-name">Basic Drone</div>
            <button class="btn-breed" onclick="sendBreedLink(1)">🔗 MERGE</button>
        </div>

        <div class="card rare">
            <div class="lvl-badge">LVL 2</div>
            <div class="drone-icon">🛸</div>
            <div class="drone-name">Scout Drone</div>
            <button class="btn-breed" onclick="sendBreedLink(2)">🔗 MERGE</button>
        </div>

        <div class="card legendary">
            <div class="lvl-badge">LVL 5</div>
            <div class="capsule-icon">🥚</div>
            <div class="drone-name">Incubating...</div>
            <div class="timer-box">01:59:45</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Эта функция будет закрывать WebApp и просить бота выдать ссылку в чат
        function sendBreedLink(droneId) {
            tg.HapticFeedback.impactOccurred('medium');
            
            // Отправляем данные боту (мы это настроим в main.py позже)
            const data = JSON.stringify({ action: "get_breed_link", drone_id: droneId });
            tg.sendData(data);
        }
    </script>
</body>
</html>
