<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBITAL GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; color: white; pointer-events: none; }
        .btn-ui { pointer-events: auto; background: #0088cc; border: none; color: white; padding: 10px; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui">
        <div>💎 Score: <span id="score">0</span></div>
        <button class="btn-ui" onclick="alert('Реклама скоро будет!')">📺 +500 Points</button>
    </div>
    <div id="game-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Настройки игры
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#0f0f0f',
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { preload, create, update }
        };

        const game = new Phaser.Game(config);
        let player, crystals, score = 0;

        function preload() {
            // Загрузка не нужна, рисуем фигуры программно
        }

        function create() {
            // Создаем игрока (Зеленый шар)
            player = this.add.circle(window.innerWidth/2, window.innerHeight/2, 20, 0x00ff00);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            // Группа кристаллов
            crystals = this.physics.add.group();
            for(let i=0; i<8; i++) { spawnCrystal(this); }

            // Отработка касаний
            this.input.on('pointermove', (pointer) => {
                this.tweens.add({
                    targets: player,
                    x: pointer.x,
                    y: pointer.y,
                    duration: 100
                });
            });

            // Проверка столкновений
            this.physics.add.overlap(player, crystals, collectCrystal, null, this);
        }

        function spawnCrystal(scene) {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const c = scene.add.circle(x, y, 10, 0x0088ff);
            scene.physics.add.existing(c);
            crystals.add(c);
        }

        function collectCrystal(player, crystal) {
            crystal.destroy();
            score += 10;
            document.getElementById('score').innerText = score;
            spawnCrystal(this);
            tg.HapticFeedback.impactOccurred('light');
        }

        function update() {}
    </script>
</body>
</html>
