<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OBITAL HD + MECH</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #ton-connect { position: absolute; top: 15px; right: 15px; z-index: 100; }
        #ui-overlay { position: absolute; top: 15px; left: 15px; z-index: 50; pointer-events: none; text-shadow: 0 0 10px #00f2ff; }
        #combo-text { color: #ff00ff; font-weight: bold; font-size: 20px; transition: 0.2s; }
        #magnet-ui { color: #b700ff; font-weight: bold; font-size: 16px; display: none; margin-top: 5px; text-shadow: 0 0 10px #b700ff;}
        .hud-btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                   background: linear-gradient(45deg, #0088cc, #00f2ff); border: none; padding: 15px 30px; 
                   border-radius: 15px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; 
                   box-shadow: 0 0 15px #0088cc; pointer-events: auto; display: none; z-index: 100;}
        #game-over { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 40px; color: #ff0044; 
                     text-shadow: 0 0 20px #ff0044; display: none; z-index: 100; font-weight: bold; pointer-events: none;}
    </style>
</head>
<body>
    <div id="ton-connect"></div>
    
    <div id="ui-overlay">
        <div style="font-size: 28px;">💎 <span id="score">0</span></div>
        <div id="combo-text">Combo: x1</div>
        <div style="font-size: 14px; opacity: 0.8; margin-top: 5px;">Level: <span id="lvl">1</span></div>
        <div id="magnet-ui">🧲 MAGNET ACTIVE!</div>
    </div>
    
    <div id="game-over">SYSTEM FAILURE</div>
    <button class="hud-btn" id="save-btn" onclick="saveAndExit()">SAVE PROGRESS & EXIT</button>
    
    <div id="game-container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Инициализация кошелька TON
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://mikeshwagens-cell.github.io/my-first-game/tonconnect-manifest.json',
            buttonRootId: 'ton-connect'
        });

        // Игровые переменные
        let player, crystals, goldCrystals, enemies, powerups, blackhole;
        let particles, trail;
        let score = 0, level = 1, speed = 0.15;
        let combo = 1, comboTimer, magnetTimer;
        let isGameOver = false, magnetActive = false;
        let lastTapTime = 0;

        // 2. Настройка HD графики (WEBGL + resolution)
        const config = {
            type: Phaser.WEBGL, 
            width: window.innerWidth, height: window.innerHeight,
            parent: 'game-container', backgroundColor: '#050505',
            resolution: window.devicePixelRatio, 
            physics: { default: 'arcade' }, scene: { create, update }
        };
        const game = new Phaser.Game(config);

        function create() {
            // Эффект следа (Particles)
            particles = this.add.particles(0, 0, 'flares', {
                speed: 20, scale: { start: 0.5, end: 0 },
                blendMode: 'ADD', lifespan: 400
            });

            // Игрок
            player = this.add.circle(window.innerWidth/2, window.innerHeight/2 + 100, 15, 0x00ff00);
            this.physics.add.existing(player);
            trail = particles.startFollow(player);

            crystals = this.physics.add.group();
            goldCrystals = this.physics.add.group();
            enemies = this.physics.add.group();
            powerups = this.physics.add.group();

            for(let i=0; i<6; i++) spawnCrystal(this);

            // Таймеры спавна
            this.time.addEvent({ delay: 3500, loop: true, callback: () => { if(!isGameOver) spawnEnemy(this); }});
            this.time.addEvent({ delay: 15000, loop: true, callback: () => { if(!isGameOver) spawnPowerup(this); }});
            this.time.addEvent({ delay: 10000, loop: true, callback: () => { if(!isGameOver) spawnGold(this); }});

            // Черная дыра
            this.time.delayedCall(20000, () => {
                blackhole = this.add.circle(window.innerWidth/2, window.innerHeight/2, 40, 0x220033);
                blackhole.setStrokeStyle(4, 0xaa00ff, 0.8);
                this.physics.add.existing(blackhole);
                this.physics.add.overlap(player, blackhole, gameOver, null, this);
            });

            // Столкновения
            this.physics.add.overlap(player, crystals, collectCrystal, null, this);
            this.physics.add.overlap(player, goldCrystals, collectGold, null, this);
            this.physics.add.overlap(player, powerups, collectMagnet, null, this);
            this.physics.add.overlap(player, enemies, gameOver, null, this);

            // Механика Рывка (Двойной тап)
            this.input.on('pointerdown', () => {
                let now = this.time.now;
                if (now - lastTapTime < 300 && !isGameOver) {
                    this.tweens.add({ targets: player, x: this.input.activePointer.x, y: this.input.activePointer.y, duration: 150, ease: 'Power2' });
                    tg.HapticFeedback.impactOccurred('heavy');
                }
                lastTapTime = now;
            });
        }

        function spawnCrystal(scene) {
            const x = Phaser.Math.Between(20, window.innerWidth - 20);
            const y = Phaser.Math.Between(20, window.innerHeight - 20);
            const c = scene.add.circle(x, y, 8, 0x00f2ff);
            c.setStrokeStyle(2, 0xffffff, 0.8);
            scene.physics.add.existing(c);
            crystals.add(c);
        }

        function spawnGold(scene) {
            const x = Phaser.Math.Between(50, window.innerWidth - 50);
            const y = Phaser.Math.Between(50, window.innerHeight - 50);
            const g = scene.add.circle(x, y, 12, 0xffd700);
            g.setStrokeStyle(2, 0xffaa00, 1);
            scene.physics.add.existing(g);
            goldCrystals.add(g);
        }

        function spawnPowerup(scene) {
            const x = Phaser.Math.Between(30, window.innerWidth - 30);
            const y = Phaser.Math.Between(30, window.innerHeight - 30);
            const p = scene.add.circle(x, y, 10, 0xb700ff);
            scene.physics.add.existing(p);
            powerups.add(p);
        }

        function spawnEnemy(scene) {
            const x = Math.random() > 0.5 ? 0 : window.innerWidth;
            const y = Math.random() * window.innerHeight;
            const e = scene.add.circle(x, y, 12, 0xff0044);
            e.setStrokeStyle(2, 0xff0000, 1);
            scene.physics.add.existing(e);
            enemies.add(e);
            scene.physics.moveToObject(e, player, 80 + (level * 10));
        }

        function collectCrystal(p, c) {
            c.destroy();
            addScore(10 * combo);
            spawnCrystal(this);
            updateCombo(this);
        }

        function collectGold(p, g) {
            g.destroy();
            addScore(100);
            tg.HapticFeedback.notificationOccurred('success');
        }

        function collectMagnet(p, m) {
            m.destroy();
            magnetActive = true;
            document.getElementById('magnet-ui').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
            
            if(magnetTimer) magnetTimer.remove();
            magnetTimer = this.time.delayedCall(7000, () => {
                magnetActive = false;
                document.getElementById('magnet-ui').style.display = 'none';
            });
        }

        function addScore(amount) {
            score += amount;
            document.getElementById('score').innerText = score;
            tg.HapticFeedback.impactOccurred('light');

            if (score > level * 250) {
                level++;
                speed += 0.02;
                document.getElementById('lvl').innerText = level;
            }
        }

        function updateCombo(scene) {
            combo++;
            document.getElementById('combo-text').innerText = `Combo: x${combo}`;
            if(comboTimer) comboTimer.remove();
            comboTimer = scene.time.delayedCall(2000, () => {
                combo = 1;
                document.getElementById('combo-text').innerText = `Combo: x1`;
            });
        }

        function gameOver() {
            if(isGameOver) return;
            isGameOver = true;
            this.physics.pause();
            if (particles) particles.destroy();
            player.setFillStyle(0x333333); 
            tg.HapticFeedback.notificationOccurred('error');
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('save-btn').style.display = 'block';
        }

        function update() {
            if (isGameOver) return;

            if (this.input.activePointer.isDown) {
                player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, speed);
                player.y = Phaser.Math.Linear(player.y, this.input.activePointer.y, speed);
            }

            if (magnetActive) {
                crystals.getChildren().forEach(c => {
                    if (Phaser.Math.Distance.Between(player.x, player.y, c.x, c.y) < 250) {
                        this.physics.moveToObject(c, player, 400);
                    }
                });
            }

            goldCrystals.getChildren().forEach(g => {
                if (Phaser.Math.Distance.Between(player.x, player.y, g.x, g.y) < 150) {
                    let angle = Phaser.Math.Angle.Between(player.x, player.y, g.x, g.y);
                    this.physics.velocityFromRotation(angle, 150, g.body.velocity);
                } else {
                    g.body.setVelocity(0, 0);
                }
            });

            if(blackhole) {
                blackhole.scale = 1 + Math.sin(this.time.now / 300) * 0.1;
            }
        }

        function saveAndExit() {
            const data = JSON.stringify({ action: "save_game", earned: score, new_level: level });
            tg.sendData(data); 
        }
    </script>
</body>
</html>
